<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<!-- Оптимизированный viewport: запрещает зум, но учитывает безопасные зоны (чёлки, home bar) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bce — Мобильный редактор</title>
<link rel="stylesheet" href="bce.css">
<style>
    /* Базовые сбросы и учёт безопасных зон (notch, home indicator) */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #121212;
        color: #eee;
        margin: 0;
        padding: 16px;
        padding-top: max(16px, env(safe-area-inset-top));
        padding-bottom: max(16px, env(safe-area-inset-bottom));
        -webkit-tap-highlight-color: transparent; /* Убирает синюю подсветку при тапе на Android/iOS */
    }

    h1 { 
        color: #4ec9b0; 
        margin-top: 0; 
        font-size: 1.4rem; 
        margin-bottom: 12px;
    }

    .info {
        background: #252526;
        padding: 12px 16px;
        border-left: 3px solid #4ec9b0;
        margin-bottom: 16px;
        border-radius: 6px;
        font-size: 13px;
        line-height: 1.5;
    }

    .info code {
        background: #1e1e1e;
        padding: 2px 6px;
        border-radius: 4px;
        color: #ce9178;
        font-family: monospace;
    }

    #editor { 
        min-height: 250px; 
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
        /* КРИТИЧЕСКИ ВАЖНО: 16px предотвращает авто-зум на iOS при фокусе */
        font-size: 16px; 
    }
    
    .status-bar {
        background: #007acc;
        color: white;
        padding: 10px 16px;
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 12px;
        border-bottom-left-radius: 6px;
        border-bottom-right-radius: 6px;
        margin-top: -1px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
    }

    .status-bar .highlight {
        font-weight: bold;
        background: rgba(255, 255, 255, 0.2);
        padding: 2px 6px;
        border-radius: 3px;
    }

    /* Сетка для кнопок: на мобильных удобнее 2 колонки */
    .controls {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }

    button {
        background: #0e639c;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        /* Минимальная высота 44px — стандарт для удобного нажатия пальцем */
        min-height: 44px; 
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s, background 0.2s;
    }

    button:active { 
        transform: scale(0.96); 
        background: #1177bb;
    }

    button.secondary { 
        background: #3c3c3c; 
    }
    button.secondary:active { 
        background: #4c4c4c; 
    }
    
    /* Чекбокс растягиваем на всю ширину сетки */
    .checkbox-label {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 14px;
        cursor: pointer;
        user-select: none;
        padding: 12px;
        background: #252526;
        border-radius: 6px;
        margin-top: 4px;
    }

    .checkbox-label input { 
        transform: scale(1.4); 
        accent-color: #4ec9b0;
    }
    
    #output {
        margin-top: 20px;
        background: #1e1e1e;
        border: 1px solid #3c3c3c;
        padding: 12px;
        border-radius: 6px;
        font-family: Consolas, monospace;
        font-size: 12px;
        white-space: pre-wrap;
        max-height: 40vh; /* Ограничиваем высоту, чтобы не занимать весь экран */
        overflow: auto;
        color: #9cdcfe;
        -webkit-overflow-scrolling: touch; /* Плавный скролл на iOS */
    }
</style>
</head>
<body>

<h1>📝 Bce Editor</h1>

<div class="info">
    <b>Emmet:</b> введите <code>a</code>, <code>code</code> и нажмите <b>Tab</b> (ПК) или <b>,</b> (мобильный).
</div>

<div id="editor"></div>

<div id="cursor-monitor" class="status-bar">
    <span>Стр: <span class="highlight" id="mon-line">1</span> | Симв: <span class="highlight" id="mon-col">1</span></span>
    <span id="mon-selection" style="font-size: 11px;">Выделение: нет</span>
</div>

<div class="controls">
    <button onclick="loadLines()">📋 Строки (JSON)</button>
    <button class="secondary" onclick="editor.undo()">↩ Отменить</button>
    <button class="secondary" onclick="editor.redo()">↪ Вернуть</button>
    
    <label class="checkbox-label">
        <input type="checkbox" id="toggleLines" onchange="toggleLineNumbers(this.checked)">
        Показывать номера строк
    </label>

    <label class="checkbox-label">
        <input type="checkbox" id="toggleOnChange" onchange="toggleOnChange(this.checked)">
        Отслеживать изменения (onChange)
    </label>
</div>

<pre id="output">Здесь появится результат...</pre>

<script src="bce.js"></script>
<script>
    const html = `<h1>Привет с телефона!</h1>
<p>Это мобильный Bce.</p>
<ul>
    <li>Введите h2 и нажмите \</li>
    <li>Клавиатура не будет зумить экран</li>
</ul>`

    const editor = new Bce('#editor', {
        initialText: ``,
        showLineNumbers: false
    });

    function updateCursorMonitor() {
        const cursor = editor.getCursor();
        const monLine = document.getElementById('mon-line');
        const monCol = document.getElementById('mon-col');
        const monSel = document.getElementById('mon-selection');

        if (!cursor) {
            monLine.textContent = '-';
            monCol.textContent = '-';
            monSel.textContent = 'Курсор вне редактора';
            return;
        }

        monLine.textContent = cursor.startLine + 1;
        monCol.textContent = cursor.startOffset + 1;

        const isSelection = cursor.startLine !== cursor.endLine || cursor.startOffset !== cursor.endOffset;
        if (isSelection) {
            monSel.textContent = `Выделение до: Стр ${cursor.endLine + 1}, Симв ${cursor.endOffset}`;
            monSel.style.color = '#ffd700';
        } else {
            monSel.textContent = 'Выделение: нет';
            monSel.style.color = 'rgba(255,255,255,0.7)';
        }
    }

    editor.content.addEventListener('keyup', updateCursorMonitor);
    editor.content.addEventListener('mouseup', updateCursorMonitor);
    editor.content.addEventListener('click', updateCursorMonitor);
    editor.content.addEventListener('input', updateCursorMonitor);
    updateCursorMonitor();

    function loadLines() {
        document.getElementById('output').textContent = JSON.stringify(editor.lines, null, 2);
        // Прокрутка к результату на мобильных
        document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function toggleLineNumbers(show) {
        editor.setShowLineNumbers(show);
    }

    function toggleOnChange(enable) {
        if (enable) {
            editor.onChange((ed) => {
                console.log(ed.lines)
            });
        } else {
            editor.onChange(null);
            document.getElementById('output').textContent = 'Отслеживание отключено';
        }
    }
</script>

</body>
</html>
